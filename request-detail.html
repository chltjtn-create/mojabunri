<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공사 상세 — SKB 모자분리 공사요청</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="app-header">
  <span class="logo">⚡ SKB 모자분리 공사요청</span>
  <nav id="app-nav">
    <a href="dashboard.html">대시보드</a>
    <a href="request-new.html">모자분리접수</a>
    <a href="admin.html" id="nav-admin" style="display:none">관리자</a>
  </nav>
  <script>(function(){var p=location.pathname.split('/').pop()||'dashboard.html';document.querySelectorAll('#app-nav a').forEach(function(a){if(a.getAttribute('href')===p)a.classList.add('nav-active');});})();</script>
  <div class="user-info">
    <span id="user-info"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="container" style="max-width:1000px;">
  <div id="page-loading" style="text-align:center;padding:3rem;color:#6c757d;">불러오는 중...</div>
  <div id="page-content" style="display:none;">

    <!-- 헤더 -->
    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
        <div>
          <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;">
            <h2 id="req-number" style="font-size:1.3rem;font-weight:700;"></h2>
            <span id="req-type-badge"></span>
            <span id="req-status-badge"></span>
          </div>
          <div style="font-size:.85rem;color:#6c757d;" id="req-dates"></div>
        </div>
        <div id="status-actions" style="display:flex;gap:.5rem;flex-wrap:wrap;"></div>
      </div>
    </div>

    <div class="detail-grid">
      <!-- 좌측 -->
      <div>
        <!-- 민원인 정보 -->
        <div class="card" style="margin-bottom:1rem;">
          <div class="card-title">민원인 정보</div>
          <div class="detail-field"><div class="label">소속</div><div class="value" id="d-org"></div></div>
          <div class="detail-field"><div class="label">이름</div><div class="value" id="d-name"></div></div>
          <div class="detail-field"><div class="label">연락처</div><div class="value" id="d-phone"></div></div>
          <div class="detail-field"><div class="label">이메일</div><div class="value" id="d-email"></div></div>
        </div>

        <!-- 건물/전기 정보 -->
        <div class="card" style="margin-bottom:1rem;">
          <div class="card-title">건물 · 전기 정보</div>
          <div class="detail-field"><div class="label">한전고객번호</div><div class="value" id="d-kepco"></div></div>
          <div class="detail-field"><div class="label">건물코드 (SKB)</div><div class="value" id="d-building-code"></div></div>
          <div class="detail-field"><div class="label">건물명</div><div class="value" id="d-building-name"></div></div>
          <div class="detail-field"><div class="label">주소</div><div class="value" id="d-address"></div></div>
          <div class="detail-field" id="d-low-voltage-row" style="display:none;">
            <div class="label">저압 케이스</div>
            <div class="value" style="color:#dc3545;font-weight:600;">한전불입금 발생 (CAPEX 포함)</div>
          </div>
        </div>

        <!-- 비용 정보 -->
        <div class="card" style="margin-bottom:1rem;">
          <div class="card-title">비용 정보</div>
          <div class="detail-field"><div class="label">대관업무비 (OPEX)</div><div class="value" id="d-opex"></div></div>
          <div class="detail-field">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div class="label">CAPEX 공사금액</div>
              <button class="btn btn-secondary btn-sm" id="btn-edit-capex" onclick="editCapex()">수정</button>
            </div>
            <div class="value" id="d-capex"></div>
          </div>
          <div class="detail-field">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div class="label">절감 KW / 절감금액 (KPI)</div>
              <button class="btn btn-secondary btn-sm" id="btn-edit-kpi" onclick="editKpi()">수정</button>
            </div>
            <div class="value" id="d-kpi"></div>
          </div>
        </div>
      </div>

      <!-- 우측 -->
      <div>
        <!-- 담당자 배정 -->
        <div class="card" style="margin-bottom:1rem;" id="card-assignment">
          <div class="card-title">담당자 배정</div>
          <div class="detail-field"><div class="label">SKB 담당자</div><div class="value" id="d-skb-manager"></div></div>
          <div class="detail-field"><div class="label">협력사 (2군 BP)</div><div class="value" id="d-partner-bp"></div></div>
        </div>

        <!-- 직인날인 체크리스트 -->
        <div class="card" style="margin-bottom:1rem;" id="card-checklist">
          <div class="card-title">직인날인 체크리스트</div>
          <div id="checklist-list"></div>
        </div>

        <!-- 첨부파일 -->
        <div class="card" style="margin-bottom:1rem;">
          <div class="section-header">
            <div class="card-title" style="margin:0;">첨부파일</div>
            <label class="btn btn-secondary btn-sm" style="cursor:pointer;">
              파일 업로드
              <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles()">
            </label>
          </div>
          <div id="file-list" style="margin-top:.5rem;"></div>
        </div>

        <!-- 비고 -->
        <div class="card" style="margin-bottom:1rem;">
          <div class="card-title">비고</div>
          <div id="d-notes" style="font-size:.875rem;color:#495057;white-space:pre-wrap;"></div>
        </div>
      </div>
    </div>

    <!-- 활동 이력 -->
    <div class="card">
      <div class="card-title">활동 이력</div>
      <ul class="timeline" id="timeline-list"></ul>
    </div>

  </div>
</div>

<!-- CAPEX 수정 모달 -->
<div id="modal-capex" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div class="card" style="width:360px;">
    <div class="card-title">CAPEX 수정</div>
    <div class="form-group">
      <label class="form-label">공사금액 (원)</label>
      <input type="number" id="capex-input" class="form-control" min="0">
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('modal-capex')">취소</button>
      <button class="btn btn-primary" onclick="saveCapex()">저장</button>
    </div>
  </div>
</div>

<!-- KPI 수정 모달 -->
<div id="modal-kpi" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div class="card" style="width:360px;">
    <div class="card-title">절감효과 수정</div>
    <div class="form-group">
      <label class="form-label">절감 KW</label>
      <input type="number" id="kpi-kw" class="form-control" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">절감금액 (원)</label>
      <input type="number" id="kpi-amount" class="form-control" min="0">
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('modal-kpi')">취소</button>
      <button class="btn btn-primary" onclick="saveKpi()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, renderUserInfo, logout as _logout } from './assets/js/auth.js';
import { fetchRequest, fetchEvents, fetchChecklists, fetchFiles, changeStatus, updateRequest, updateChecklist, uploadFile, getFileUrl } from './assets/js/requests.js';
import { showToast, showLoading, renderStatusBadge, renderTypeBadge, formatDate, formatDateTime, formatMoney } from './assets/js/ui.js';

window.logout = _logout;

const STATUS_ORDER = ['접수', 'SKB검토중', '2군진행', '한전처리중', '완료'];
const CHECKLIST_LABELS = { skb_stamp: 'SKB 직인', apartment_stamp: '아파트 직인', kepco_stamp: '한전 직인', contractor_stamp: '전기면허업체 직인' };

let req = null;
let profile = null;
const reqId = new URLSearchParams(location.search).get('id');

(async () => {
  if (!reqId) { location.href = 'dashboard.html'; return; }
  profile = await requireAuth();
  if (!profile) return;
  renderUserInfo(profile);
  await loadAll();
})();

async function loadAll() {
  try {
    [req] = await Promise.all([fetchRequest(reqId)]);
    renderDetail();
    loadEvents();
    loadChecklists();
    loadFiles();
  } catch(e) {
    document.getElementById('page-loading').textContent = '데이터를 불러올 수 없습니다: ' + e.message;
  }
}

function renderDetail() {
  document.getElementById('page-loading').style.display = 'none';
  document.getElementById('page-content').style.display = 'block';

  document.getElementById('req-number').textContent = req.request_number;
  document.getElementById('req-type-badge').innerHTML = renderTypeBadge(req.request_type);
  document.getElementById('req-status-badge').innerHTML = renderStatusBadge(req.status);
  document.getElementById('req-dates').textContent = `접수일: ${formatDate(req.created_at)}  |  현 단계 시작: ${formatDate(req.current_stage_started_at)}` + (req.completed_at ? `  |  완료: ${formatDate(req.completed_at)}` : '');

  document.getElementById('d-org').textContent = req.requester_org || '-';
  document.getElementById('d-name').textContent = req.requester_name || '-';
  document.getElementById('d-phone').textContent = req.requester_phone || '-';
  document.getElementById('d-email').textContent = req.requester_email || '-';

  document.getElementById('d-kepco').textContent = req.kepco_number || '-';
  document.getElementById('d-building-code').textContent = req.building_code || '-';
  document.getElementById('d-building-name').textContent = req.building_name || '-';
  document.getElementById('d-address').textContent = req.address_text || '-';
  if (req.is_low_voltage) document.getElementById('d-low-voltage-row').style.display = 'block';

  document.getElementById('d-opex').textContent = formatMoney(req.opex_amount);
  document.getElementById('d-capex').textContent = formatMoney(req.capex_amount);
  document.getElementById('d-kpi').textContent = `${req.reduction_kw ?? 0} kW / ${formatMoney(req.reduction_amount)}`;

  document.getElementById('d-skb-manager').textContent = req.skb_manager?.full_name || '미배정';
  document.getElementById('d-partner-bp').textContent = req.partner_bp?.full_name || '미배정';
  document.getElementById('d-notes').textContent = req.notes || '없음';

  const canEdit = profile.role === 'admin' || profile.role === 'skb_manager' || profile.role === 'partner_bp';
  if (!canEdit) {
    document.getElementById('btn-edit-capex').style.display = 'none';
    document.getElementById('btn-edit-kpi').style.display = 'none';
  }

  renderStatusActions();
}

function renderStatusActions() {
  const el = document.getElementById('status-actions');
  const cur = req.status;
  const curIdx = STATUS_ORDER.indexOf(cur);
  const btns = [];

  const canAdvance = profile.role === 'admin' || profile.role === 'skb_manager' || profile.role === 'partner_bp';
  const canRevert = profile.role === 'admin';

  if (canAdvance && curIdx < STATUS_ORDER.length - 1) {
    const next = STATUS_ORDER[curIdx + 1];
    btns.push(`<button class="btn btn-primary btn-sm" onclick="doChangeStatus('${next}')">→ ${next}</button>`);
  }
  if (canRevert && curIdx > 0) {
    const prev = STATUS_ORDER[curIdx - 1];
    btns.push(`<button class="btn btn-danger btn-sm" onclick="doChangeStatus('${prev}')">← ${prev} (되돌리기)</button>`);
  }

  el.innerHTML = btns.join('');
}

async function loadEvents() {
  const { fetchEvents: fe } = await import('./assets/js/requests.js');
  const events = await fe(reqId);
  const el = document.getElementById('timeline-list');
  if (!events.length) { el.innerHTML = '<li style="color:#6c757d;font-size:.85rem;">이력 없음</li>'; return; }
  el.innerHTML = events.map(e => `
    <li class="timeline-item">
      <div class="timeline-date">${formatDateTime(e.created_at)} — ${e.actor?.full_name || '시스템'}</div>
      <div class="timeline-content">
        ${e.event_type === 'status_changed' ? `<b>${e.from_status}</b> → <b>${e.to_status}</b>` : e.event_type}
        ${e.event_message ? ` <span style="color:#6c757d">/ ${e.event_message}</span>` : ''}
      </div>
    </li>
  `).join('');
}

async function loadChecklists() {
  if (req.request_type !== '신규') { document.getElementById('card-checklist').style.display = 'none'; return; }
  const { fetchChecklists: fc, updateChecklist: uc } = await import('./assets/js/requests.js');
  const items = await fc(reqId);
  const el = document.getElementById('checklist-list');
  if (!items.length) { el.innerHTML = '<p style="font-size:.85rem;color:#6c757d;">항목 없음</p>'; return; }
  el.innerHTML = items.map(item => `
    <div class="checklist-item ${item.is_completed ? 'done' : ''}" id="cl-${item.id}">
      <input type="checkbox" ${item.is_completed ? 'checked' : ''} onchange="toggleChecklist('${item.id}', this.checked)">
      <span>${CHECKLIST_LABELS[item.checklist_code] || item.checklist_code}</span>
      ${item.is_completed && item.completed_at ? `<span style="font-size:.75rem;color:#198754;margin-left:auto;">${formatDate(item.completed_at)}</span>` : ''}
    </div>
  `).join('');
}

async function loadFiles() {
  const { fetchFiles: ff } = await import('./assets/js/requests.js');
  const files = await ff(reqId);
  const el = document.getElementById('file-list');
  if (!files.length) { el.innerHTML = '<p style="font-size:.85rem;color:#6c757d;">첨부파일 없음</p>'; return; }
  el.innerHTML = files.map(f => `
    <div class="file-item">
      <a href="${getFileUrl(f.storage_path)}" target="_blank">${f.original_filename}</a>
      <span style="font-size:.75rem;color:#6c757d;">${f.stage} · ${formatDate(f.created_at)}</span>
    </div>
  `).join('');
}

window.doChangeStatus = async (toStatus) => {
  if (!confirm(`상태를 "${toStatus}"(으)로 변경하시겠습니까?`)) return;
  const reason = prompt('사유 입력 (선택사항):', '') || null;
  showLoading(true);
  try {
    await changeStatus(reqId, toStatus, profile.id, reason);
    showToast('상태 변경 완료');
    await loadAll();
  } catch(e) {
    showToast('상태 변경 실패: ' + e.message, 'error');
  } finally { showLoading(false); }
};

window.toggleChecklist = async (id, checked) => {
  const { updateChecklist: uc } = await import('./assets/js/requests.js');
  try {
    await uc(id, checked);
    const el = document.getElementById('cl-' + id);
    if (el) el.classList.toggle('done', checked);
  } catch(e) { showToast('저장 실패', 'error'); }
};

window.uploadFiles = async () => {
  const input = document.getElementById('file-input');
  const files = Array.from(input.files);
  if (!files.length) return;
  showLoading(true);
  try {
    for (const f of files) {
      await uploadFile(reqId, req.request_number, req.status, f.type.startsWith('image/') ? 'photo' : 'document', f);
    }
    showToast(`${files.length}개 파일 업로드 완료`);
    await loadFiles();
  } catch(e) { showToast('업로드 실패: ' + e.message, 'error'); }
  finally { showLoading(false); input.value = ''; }
};

window.editCapex = () => {
  document.getElementById('capex-input').value = req.capex_amount || 0;
  document.getElementById('modal-capex').style.display = 'flex';
};
window.saveCapex = async () => {
  showLoading(true);
  try {
    await updateRequest(reqId, { capex_amount: parseInt(document.getElementById('capex-input').value || '0') });
    showToast('저장 완료');
    closeModal('modal-capex');
    await loadAll();
  } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  finally { showLoading(false); }
};

window.editKpi = () => {
  document.getElementById('kpi-kw').value = req.reduction_kw || 0;
  document.getElementById('kpi-amount').value = req.reduction_amount || 0;
  document.getElementById('modal-kpi').style.display = 'flex';
};
window.saveKpi = async () => {
  showLoading(true);
  try {
    await updateRequest(reqId, {
      reduction_kw: parseFloat(document.getElementById('kpi-kw').value || '0'),
      reduction_amount: parseInt(document.getElementById('kpi-amount').value || '0'),
    });
    showToast('저장 완료');
    closeModal('modal-kpi');
    await loadAll();
  } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  finally { showLoading(false); }
};

window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
</script>
</body>
</html>
