<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — SKB 모자분리 공사요청</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f7fc; padding: 1rem; }
    .login-box { width: 100%; max-width: 420px; background: #fff; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo h1 { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; margin-bottom: 0.5rem; }
    .login-logo p { color: #6c757d; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>⚡ 회원가입</h1>
      <p>SKB 모자분리 시스템 계정 생성</p>
    </div>

    <div id="signup-form">
      <div class="form-group">
        <label class="form-label">이메일 <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="example@sk.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="6자리 이상 입력" required>
      </div>
      <div class="form-group">
        <label class="form-label">이름(실명) <span class="required">*</span></label>
        <input type="text" id="full_name" class="form-control" placeholder="홍길동" required>
      </div>
      <div class="form-group">
        <label class="form-label">부서/조직 <span class="required">*</span></label>
        <input type="text" id="department" class="form-control" placeholder="예: 수남구축팀" required>
      </div>
      
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:1rem;" onclick="handleSignup()">회원가입 하기</button>
      
      <div style="text-align:center; margin-top:1.5rem; font-size:0.875rem;">
        <span style="color:#6c757d;">이미 계정이 있으신가요?</span>
        <a href="login.html" style="font-weight:600; margin-left:0.5rem;">로그인</a>
      </div>
      
      <div id="msg" style="margin-top:1rem; font-size:0.85rem; text-align:center; display:none;"></div>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './assets/js/supabase-client.js';

window.handleSignup = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const fullName = document.getElementById('full_name').value.trim();
  const department = document.getElementById('department').value.trim();
  const msgEl = document.getElementById('msg');

  if (!email || !password || !fullName || !department) {
    showMsg('모든 필수 항목을 입력해주세요.', 'error');
    return;
  }

  if (password.length < 6) {
    showMsg('비밀번호는 최소 6자리 이상이어야 합니다.', 'error');
    return;
  }

  try {
    // 1. Supabase Auth 계정 생성
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email: email,
      password: password
    });

    if (authError) throw authError;

    if (authData.user) {
      // 2. profiles 테이블에 사용자 정보 추가
      const { error: profileError } = await supabase
        .from('profiles')
        .insert([{
          id: authData.user.id,
          email: email,
          full_name: fullName,
          department: department,
          role: 'requester' // 기본 역할은 요청자
        }]);

      if (profileError) throw profileError;

      showMsg('회원가입이 완료되었습니다! 잠시 후 대시보드로 이동합니다.', 'success');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 2000);
    }
  } catch (error) {
    console.error('Signup error:', error);
    showMsg('가입 실패: ' + error.message, 'error');
  }
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
  el.style.color = type === 'error' ? '#dc3545' : '#198754';
}
</script>

</body>
</html>
