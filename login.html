<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — SKB 모자분리 공사요청</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>⚡ SKB 모자분리 공사요청</h1>
      <p>SK Broadband 수남구축팀</p>
    </div>

    <div id="form-login">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="email" class="form-control" placeholder="이메일 주소" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="form-control" placeholder="비밀번호" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="login()">로그인</button>
      <div style="text-align:center;margin-top:.75rem;display:flex;justify-content:center;gap:1rem;font-size:0.85rem;">
        <a href="#" onclick="showReset()" style="color:#6c757d;">비밀번호 재설정</a>
        <span style="color:#e9ecef;">|</span>
        <a href="signup.html" style="font-weight:600;color:var(--primary);">회원가입</a>
      </div>
      <div id="login-error" style="color:#dc3545;font-size:.85rem;margin-top:.5rem;display:none;"></div>
    </div>

    <div id="form-reset" style="display:none;">
      <p style="font-size:.875rem;margin-bottom:1rem;color:#6c757d;">가입하신 이메일로 재설정 링크를 보내드립니다.</p>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="reset-email" class="form-control" placeholder="이메일 주소">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="sendReset()">재설정 메일 발송</button>
      <div style="text-align:center;margin-top:.75rem;">
        <a href="#" onclick="showLogin()">← 로그인으로 돌아가기</a>
      </div>
      <div id="reset-msg" style="font-size:.85rem;margin-top:.5rem;"></div>
    </div>

    <div id="form-new-request" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e9ecef;text-align:center;">
      <p style="font-size:.82rem;color:#6c757d;">회원 가입 없이도 공사 신청 가능합니다</p>
      <a href="request-new.html" class="btn btn-secondary btn-sm" style="margin-top:.5rem;">비회원 공사 신청</a>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from './assets/js/supabase-client.js';
import { getSession } from './assets/js/auth.js';

(async () => {
  const session = await getSession();
  if (session) window.location.href = 'dashboard.html';
})();

window.login = async () => {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력하세요.'; errEl.style.display = 'block'; return; }

  const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'; errEl.style.display = 'block'; return; }
  window.location.href = 'dashboard.html';
};

window.sendReset = async () => {
  const email = document.getElementById('reset-email').value.trim();
  const msgEl = document.getElementById('reset-msg');
  if (!email) { msgEl.style.color = '#dc3545'; msgEl.textContent = '이메일을 입력하세요.'; return; }

  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/login.html' });
  if (error) { msgEl.style.color = '#dc3545'; msgEl.textContent = '전송 실패: ' + error.message; return; }
  msgEl.style.color = '#198754';
  msgEl.textContent = '재설정 링크를 이메일로 보냈습니다.';
};

window.showReset = () => {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-reset').style.display = 'block';
};

window.showLogin = () => {
  document.getElementById('form-reset').style.display = 'none';
  document.getElementById('form-login').style.display = 'block';
};

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') window.login(); });
</script>
</body>
</html>
