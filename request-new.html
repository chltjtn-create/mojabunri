<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공사 신청 — SKB 모자분리 공사요청</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.emailjs.com/browser/4/dist/email.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    .form-section { margin-bottom: .85rem; padding-bottom: .85rem; border-bottom: 1px solid #e9ecef; }
    .form-section:last-of-type { border-bottom: none; }
    .form-section-title { font-weight: 700; font-size: .88rem; color: #0052cc; margin-bottom: .5rem; padding-left: .45rem; border-left: 3px solid #0052cc; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem .85rem; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem .85rem; }
    .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: .5rem .85rem; }
    .form-group { margin-bottom: .35rem; }
    .form-label { margin-bottom: .2rem; font-size: .8rem; }
    .form-control { padding: .35rem .6rem; font-size: .85rem; }
    .form-hint { font-size: .73rem; margin-top: .15rem; }
    .file-input-wrap { border: 2px dashed #ced4da; border-radius: 6px; padding: .6rem; text-align: center; cursor: pointer; font-size: .82rem; color: #6c757d; transition: .15s; }
    .file-input-wrap:hover { border-color: #0052cc; color: #0052cc; }
    .file-list-preview { margin-top: .4rem; display: flex; flex-direction: column; gap: .25rem; }
    .file-preview-item { font-size: .78rem; color: #495057; background: #f8f9fa; padding: .25rem .5rem; border-radius: 4px; display: flex; justify-content: space-between; }
    @media (max-width: 640px) { .form-grid-2, .form-grid-3, .form-grid-4 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">⚡ SKB 모자분리 공사요청</span>
  <nav><a href="dashboard.html">대시보드</a></nav>
  <div class="user-info">
    <span id="user-info"></span>
    <button class="btn-logout" id="btn-logout" style="display:none" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="container" style="max-width:900px;">
  <!-- 엑셀 일괄 접수 섹션 -->
  <div class="card" style="margin-bottom:1.5rem; background:#f8f9ff; border:1px dashed #0052cc;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h3 style="font-size:.9rem; font-weight:700; color:#0052cc; margin-bottom:.2rem;">📊 대량 접수 (엑셀 업로드)</h3>
        <p style="font-size:.78rem; color:#666; margin:0;">여러 건의 공사를 엑셀 파일로 한 번에 접수할 수 있습니다.</p>
      </div>
      <div style="display:flex; gap:.5rem;">
        <button class="btn btn-secondary btn-sm" onclick="downloadExcelTemplate()">📁 양식 다운로드</button>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('excel-input').click()">📤 엑셀 업로드</button>
        <input type="file" id="excel-input" accept=".xlsx, .xls" style="display:none" onchange="handleExcelUpload(this)">
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-size:1rem;font-weight:700;">공사 신청 접수</h2>
      <span style="font-size:.78rem;color:#dc3545;"><span style="font-weight:700;">*</span> 표시는 필수 입력 항목</span>
    </div>

    <!-- ① 기본 분류 -->
    <div class="form-section">
      <div class="form-section-title">① 기본 분류</div>
      <div class="form-grid-4">
        <div class="form-group">
          <label class="form-label">본부</label>
          <input type="text" class="form-control" value="수남" readonly style="background:#f8f9fa;">
        </div>
        <div class="form-group">
          <label class="form-label">운용팀 <span class="required">*</span></label>
          <select id="operation_team" class="form-control">
            <option value="">선택</option>
            <option value="강남">강남</option>
            <option value="동작">동작</option>
            <option value="수원">수원</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">우선순위 <span class="required">*</span></label>
          <select id="priority" class="form-control">
            <option value="보통">보통</option>
            <option value="긴급">긴급</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">요청구분 <span class="required">*</span></label>
          <select id="request_type" class="form-control" onchange="onTypeChange()">
            <option value="">선택</option>
            <option value="신규">신규 (운용팀)</option>
            <option value="신규_아파트">아파트 요청 (신규)</option>
            <option value="변경">변경</option>
            <option value="해지">해지</option>
          </select>
        </div>
      </div>
      <div class="form-grid-2" style="margin-top:.35rem;">
        <div class="form-group">
          <label class="form-label">정보센터 <span class="required">*</span></label>
          <input type="text" id="info_center" class="form-control" placeholder="예: 수원, 강남, 용인">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end;gap:.5rem;">
          <div id="opex-hint" style="display:none;font-size:.8rem;color:#0052cc;padding:.35rem 0;">
            대관업무비(OPEX): <b id="opex-value"></b> 자동계산
          </div>
          <div id="low-voltage-wrap" style="display:none;">
            <label style="cursor:pointer;display:flex;align-items:center;gap:.4rem;font-size:.82rem;">
              <input type="checkbox" id="is_low_voltage" style="accent-color:#0052cc;">
              한전불입금 포함
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- ② 건물 정보 -->
    <div class="form-section">
      <div class="form-section-title">② 건물 정보</div>
      <div class="form-grid-3">
        <div class="form-group">
          <label class="form-label">건물명 <span class="required">*</span></label>
          <input type="text" id="building_name" class="form-control" placeholder="예: 강남아파트">
        </div>
        <div class="form-group">
          <label class="form-label">건물주소 <span class="required">*</span></label>
          <input type="text" id="address_text" class="form-control" placeholder="도로명 주소">
        </div>
        <div class="form-group">
          <label class="form-label">건물유형 <span class="required">*</span></label>
          <select id="building_type" class="form-control">
            <option value="">선택</option>
            <option value="아파트">아파트</option>
            <option value="빌라">빌라</option>
            <option value="상가">상가</option>
            <option value="오피스텔">오피스텔</option>
            <option value="업무시설">업무시설</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">건물코드 (SKB 15자리) <span class="required">*</span></label>
          <input type="text" id="building_code" class="form-control" placeholder="A00000000000001" maxlength="15">
        </div>
        <div class="form-group">
          <label class="form-label">동수 <span class="required">*</span></label>
          <input type="text" id="building_dong" class="form-control" placeholder="예: 3동">
        </div>
        <div class="form-group">
          <label class="form-label">세대수 <span class="required">*</span></label>
          <input type="text" id="household_count" class="form-control" placeholder="예: 150세대">
        </div>
      </div>
    </div>

    <!-- ③ 국사 · 장비 정보 -->
    <div class="form-section">
      <div class="form-section-title">③ 국사 · 장비 정보</div>
      <div class="form-grid-3">
        <div class="form-group">
          <label class="form-label">국사코드 <span class="required">*</span></label>
          <input type="text" id="gwangdanguksa_code" class="form-control" placeholder="예: W20029">
        </div>
        <div class="form-group">
          <label class="form-label">국사명 <span class="required">*</span></label>
          <input type="text" id="gwangdanguksa_name" class="form-control" placeholder="예: 용인_영덕경기행복주택(GPON)_TYPEB">
        </div>
        <div class="form-group">
          <label class="form-label">장비설치일 (가용일) <span class="required">*</span></label>
          <input type="date" id="equipment_install_date" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">청구유형 <span class="required">*</span></label>
          <select id="billing_type" class="form-control">
            <option value="">선택</option>
            <option value="정액제">정액제</option>
            <option value="종량제">종량제</option>
            <option value="해지">해지</option>
            <option value="변경">변경</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">차단기위치 <span class="required">*</span></label>
          <input type="text" id="breaker_location" class="form-control" placeholder="예: 1층 관리소내 MDF">
        </div>
        <div class="form-group">
          <label class="form-label">계량기위치 <span class="required">*</span></label>
          <input type="text" id="meter_location" class="form-control" placeholder="예: 1층 관리소내 MDF">
        </div>
      </div>
    </div>

    <!-- ④ 한전 정보 -->
    <div class="form-section">
      <div class="form-section-title">④ 한전 정보</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">한전고객번호</label>
          <input type="text" id="kepco_number" class="form-control" placeholder="00-0000-0000" maxlength="12">
          <p class="form-hint">형식: XX-XXXX-XXXX (나중에 입력 가능)</p>
        </div>
        <div class="form-group">
          <label class="form-label">CAPEX 공사금액 (원) <span class="required">*</span></label>
          <input type="number" id="capex_amount" class="form-control" placeholder="0" min="0">
          <p class="form-hint">자체 내역서 견적 금액. 저압 시 한전불입금 포함.</p>
        </div>
      </div>
    </div>

    <!-- ⑤ 민원인 정보 -->
    <div class="form-section">
      <div class="form-section-title">⑤ 민원인 정보 (건물 담당자)</div>
      <div class="form-grid-3">
        <div class="form-group">
          <label class="form-label">민원인 이름 <span class="required">*</span></label>
          <input type="text" id="complainant_name" class="form-control" placeholder="예: 관리소장">
        </div>
        <div class="form-group">
          <label class="form-label">민원인 연락처 <span class="required">*</span></label>
          <input type="tel" id="complainant_phone" class="form-control" placeholder="02-123-4567">
        </div>
        <div class="form-group">
          <label class="form-label">민원인 이메일 <span class="required">*</span></label>
          <input type="email" id="complainant_email" class="form-control" placeholder="xxxx@naver.com">
        </div>
      </div>
    </div>

    <!-- ⑥ 요청자 정보 -->
    <div class="form-section">
      <div class="form-section-title">⑥ 요청자 정보</div>
      <div class="form-grid-4">
        <div class="form-group">
          <label class="form-label">소속 <span class="required">*</span></label>
          <select id="requester_org" class="form-control">
            <option value="">선택</option>
            <option value="SKB">SKB</option>
            <option value="HNS">HNS</option>
            <option value="PTCE">PTCE</option>
            <option value="기타(민원인)">기타(민원인)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">이름 <span class="required">*</span></label>
          <input type="text" id="requester_name" class="form-control" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">연락처 <span class="required">*</span></label>
          <input type="tel" id="requester_phone" class="form-control" placeholder="010-1111-2222">
        </div>
        <div class="form-group">
          <label class="form-label">이메일 <span class="required">*</span></label>
          <input type="email" id="requester_email" class="form-control" placeholder="xxxx@naver.com">
        </div>
      </div>
    </div>

    <!-- ⑦ 메모 -->
    <div class="form-section">
      <div class="form-section-title">⑦ 메모</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">특이사항 <span class="required">*</span></label>
          <textarea id="notes" class="form-control" rows="2" placeholder="현장 특이사항, 민원 내용 등"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">처리메모</label>
          <textarea id="process_memo" class="form-control" rows="2" placeholder="내부 처리 메모 (선택)"></textarea>
        </div>
      </div>
    </div>

    <!-- ⑧ 파일 첨부 -->
    <div class="form-section">
      <div class="form-section-title">⑧ 파일 첨부</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">설치장비 List <span class="required">*</span></label>
          <label class="file-input-wrap" for="file-equipment">
            📎 파일 선택 (엑셀/PDF)
            <input type="file" id="file-equipment" multiple accept=".xlsx,.xls,.pdf,.csv" style="display:none" onchange="previewFiles('file-equipment','preview-equipment')">
          </label>
          <div class="file-list-preview" id="preview-equipment"></div>
        </div>
        <div class="form-group">
          <label class="form-label">첨부서류 <span class="required">*</span></label>
          <label class="file-input-wrap" for="file-docs">
            📎 파일 선택 (이미지/PDF)
            <input type="file" id="file-docs" multiple accept=".pdf,.jpg,.jpeg,.png,.gif" style="display:none" onchange="previewFiles('file-docs','preview-docs')">
          </label>
          <div class="file-list-preview" id="preview-docs"></div>
        </div>
      </div>
    </div>

    <div id="submit-error" style="color:#dc3545;font-size:.83rem;margin-bottom:.6rem;display:none;"></div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;">
      <a href="dashboard.html" class="btn btn-secondary">취소</a>
      <button class="btn btn-primary" onclick="submitRequest()">접수 신청</button>
    </div>
  </div>
</div>

<script type="module">
import { getSession, getProfile, renderUserInfo, logout as _logout } from './assets/js/auth.js';
import { createRequest, uploadFile } from './assets/js/requests.js';
import { showToast, showLoading } from './assets/js/ui.js';

// ──────────────────────────────────────────────────
// EmailJS 설정 (emailjs.com 에서 발급 후 여기에 입력)
// 설정 방법: 프로젝트_정보.md 의 "이메일 발송 설정" 참고
const EMAILJS_PUBLIC_KEY  = 'Qc9w1EBx8DbumEHqP';
const EMAILJS_SERVICE_ID  = 'fiberworkman_8303';
const EMAILJS_TEMPLATE_ID = 'tn374l9';
// ──────────────────────────────────────────────────

async function sendNotificationEmails(req) {
  if (!window.emailjs || EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
    console.warn('EmailJS 미설정 — 이메일 발송 생략');
    return;
  }
  try {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    const { supabase } = await import('./assets/js/supabase-client.js');

    // 관리자 + 협력사 이메일 조회
    const { data: recipients } = await supabase
      .from('profiles')
      .select('email, full_name, role')
      .in('role', ['admin', 'partner_bp']);

    if (!recipients?.length) return;

    const detailUrl = `https://chltjtn-create.github.io/mojabunri/request-detail.html?id=${req.id}`;
    const eqFiles = Array.from(document.getElementById('file-equipment').files);
    const fileNames = eqFiles.map(f => f.name).join(', ') || '없음';

    for (const r of recipients) {
      if (!r.email) continue;
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email:          r.email,
        to_name:           r.full_name || r.email,
        request_number:    req.request_number,
        request_type:      req.request_type,
        priority:          req.priority || '보통',
        building_name:     req.building_name || '-',
        building_code:     req.building_code || '-',
        gwangdanguksa_name: req.gwangdanguksa_name || '-',
        equipment_install_date: req.equipment_install_date || '-',
        requester_name:    req.requester_name || '-',
        requester_phone:   req.requester_phone || '-',
        requester_email:   req.requester_email || '-',
        file_names:        fileNames,
        detail_url:        detailUrl,
      });
    }
    console.log(`이메일 발송 완료 (${recipients.length}명)`);
  } catch (e) {
    console.warn('이메일 발송 실패 (접수는 정상 완료):', e.message);
  }
}

window.logout = _logout;

(async () => {
  const session = await getSession();
  if (session) {
    const profile = await getProfile();
    if (profile) {
      renderUserInfo(profile);
      document.getElementById('btn-logout').style.display = 'block';
      document.getElementById('requester_email').value = profile.email || '';
      document.getElementById('requester_name').value = profile.full_name || '';
      document.getElementById('requester_phone').value = profile.phone || '';
      if (profile.role === 'skb_manager' || profile.role === 'admin') {
        document.getElementById('requester_org').value = 'SKB';
      }
    }
  }
})();

window.onTypeChange = () => {
  const type = document.getElementById('request_type').value;
  const hintEl = document.getElementById('opex-hint');
  const opexVal = document.getElementById('opex-value');
  const lowVoltageWrap = document.getElementById('low-voltage-wrap');
  if (type) {
    const isNew = type === '신규' || type === '신규_아파트';
    opexVal.textContent = isNew ? '470,000원' : '376,000원';
    hintEl.style.display = 'block';
    lowVoltageWrap.style.display = isNew ? 'block' : 'none';
    if (!isNew) document.getElementById('is_low_voltage').checked = false;
  } else {
    hintEl.style.display = 'none';
    lowVoltageWrap.style.display = 'none';
  }
};

window.previewFiles = (inputId, previewId) => {
  const files = Array.from(document.getElementById(inputId).files);
  const preview = document.getElementById(previewId);
  preview.innerHTML = files.map(f =>
    `<div class="file-preview-item"><span>${f.name}</span><span>${(f.size/1024).toFixed(0)}KB</span></div>`
  ).join('');
};

window.submitRequest = async () => {
  const errEl = document.getElementById('submit-error');
  errEl.style.display = 'none';

  const v = id => document.getElementById(id).value.trim();
  const sv = id => document.getElementById(id).value;

  const reqType = sv('request_type');
  const buildingCode = v('building_code');
  const kepco = v('kepco_number');

  const required = [
    [reqType, '요청구분을 선택하세요.'],
    [sv('operation_team'), '운용팀을 선택하세요.'],
    [v('info_center'), '정보센터를 입력하세요.'],
    [v('building_name'), '건물명을 입력하세요.'],
    [v('address_text'), '건물주소를 입력하세요.'],
    [sv('building_type'), '건물유형을 선택하세요.'],
    [v('building_dong'), '동수를 입력하세요.'],
    [v('household_count'), '세대수를 입력하세요.'],
    [v('gwangdanguksa_code'), '국사코드를 입력하세요.'],
    [v('gwangdanguksa_name'), '국사명을 입력하세요.'],
    [sv('equipment_install_date'), '장비설치일을 선택하세요.'],
    [sv('billing_type'), '청구유형을 선택하세요.'],
    [v('breaker_location'), '차단기위치를 입력하세요.'],
    [v('meter_location'), '계량기위치를 입력하세요.'],
    [v('complainant_name'), '민원인 이름을 입력하세요.'],
    [v('complainant_phone'), '민원인 연락처를 입력하세요.'],
    [v('complainant_email'), '민원인 이메일를 입력하세요.'],
    [sv('requester_org'), '요청자 소속을 선택하세요.'],
    [v('requester_name'), '요청자 이름을 입력하세요.'],
    [v('requester_phone'), '요청자 연락처를 입력하세요.'],
    [v('requester_email'), '요청자 이메일을 입력하세요.'],
    [v('notes'), '특이사항을 입력하세요.'],
  ];

  for (const [val, msg] of required) {
    if (!val) { errEl.textContent = msg; errEl.style.display = 'block'; return; }
  }

  if (kepco && !/^\d{2}-\d{4}-\d{4}$/.test(kepco)) {
    errEl.textContent = '한전고객번호 형식이 올바르지 않습니다. (예: 12-3456-7890)';
    errEl.style.display = 'block'; return;
  }
  if (!/^[A-Za-z0-9]{15}$/.test(buildingCode)) {
    errEl.textContent = '건물코드는 영문/숫자 포함 15자리여야 합니다.';
    errEl.style.display = 'block'; return;
  }

  const { supabase } = await import('./assets/js/supabase-client.js');
  const { data: { session } } = await supabase.auth.getSession();
  const isNew = reqType === '신규' || reqType === '신규_아파트';
  const dbType = isNew ? '신규' : reqType;

  showLoading(true);
  try {
    const req = await createRequest({
      request_number: '',
      request_type: dbType,
      requester_profile_id: session?.user?.id || null,
      requester_name: v('requester_name'),
      requester_org: sv('requester_org'),
      requester_phone: v('requester_phone'),
      requester_email: v('requester_email'),
      kepco_number: kepco,
      building_code: buildingCode,
      building_name: v('building_name'),
      address_text: v('address_text'),
      notes: v('notes'),
      capex_amount: parseInt(sv('capex_amount') || '0'),
      is_low_voltage: isNew ? document.getElementById('is_low_voltage').checked : false,
      priority: sv('priority'),
      operation_team: sv('operation_team'),
      info_center: v('info_center'),
      building_type: sv('building_type'),
      building_dong: v('building_dong'),
      household_count: v('household_count'),
      gwangdanguksa_code: v('gwangdanguksa_code'),
      gwangdanguksa_name: v('gwangdanguksa_name'),
      equipment_install_date: sv('equipment_install_date') || null,
      billing_type: sv('billing_type'),
      complainant_name: v('complainant_name'),
      complainant_phone: v('complainant_phone'),
      complainant_email: v('complainant_email'),
      breaker_location: v('breaker_location'),
      meter_location: v('meter_location'),
      process_memo: v('process_memo') || null,
    });

    // 파일 업로드
    const eqFiles = Array.from(document.getElementById('file-equipment').files);
    const docFiles = Array.from(document.getElementById('file-docs').files);
    for (const f of eqFiles) await uploadFile(req.id, req.request_number, req.status, 'document', f);
    for (const f of docFiles) await uploadFile(req.id, req.request_number, req.status, 'document', f);

    // 이메일 알림 발송 (관리자 + 협력사)
    sendNotificationEmails(req);

    showLoading(false);
    showToast(`접수 완료: ${req.request_number}`);
    setTimeout(() => { window.location.href = `request-detail.html?id=${req.id}`; }, 1500);
  } catch (e) {
    showLoading(false);
    errEl.textContent = '접수 실패: ' + e.message;
    errEl.style.display = 'block';
  }
};

// ──────────────────────────────────────────────────
// 엑셀 일괄 업로드 로직
// ──────────────────────────────────────────────────

const EXCEL_HEADERS = [
  '운용팀', '우선순위', '요청구분', '정보센터', '건물명', '건물주소', '건물유형', '건물코드', 
  '동수', '세대수', '국사코드', '국사명', '장비설치일', '청구유형', '차단기위치', '계량기위치', 
  '한전고객번호', 'CAPEX', '민원인이름', '민원인연락처', '민원인이메일', '요청자소속', '요청자이름', 
  '요청자연락처', '요청자이메일', '특이사항'
];

window.downloadExcelTemplate = () => {
  const data = [EXCEL_HEADERS, ['수원', '보통', '신규', '수원센터', '예시건물', '경기도 수원시...', '아파트', 'A00000000000001', '1동', '100', 'W1234', '수원국사', '2024-05-01', '정액제', '1층', '1층', '12-3456-7890', '1000000', '홍길동', '010-1234-5678', 'test@test.com', 'SKB', '김관리', '010-9999-8888', 'manager@sk.com', '비고내용']];
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "신청양식");
  XLSX.writeFile(wb, "모자분리_대량접수_양식.xlsx");
};

window.handleExcelUpload = async (input) => {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);

      if (!rows.length) { alert('데이터가 없습니다.'); return; }
      if (!confirm(`${rows.length}건의 데이터를 접수하시겠습니까?`)) { input.value = ''; return; }

      await processBatchRequests(rows);
    } catch (err) {
      alert('파일 읽기 실패: ' + err.message);
    } finally {
      input.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
};

async function processBatchRequests(rows) {
  const { supabase } = await import('./assets/js/supabase-client.js');
  const { data: { session } } = await supabase.auth.getSession();
  
  showLoading(true);
  let successCount = 0;
  let failCount = 0;

  for (const row of rows) {
    try {
      const reqType = row['요청구분'] || '';
      const isNew = reqType.includes('신규');
      const dbType = isNew ? '신규' : reqType;

      await createRequest({
        request_number: '',
        request_type: dbType,
        requester_profile_id: session?.user?.id || null,
        requester_name: row['요청자이름'] || '',
        requester_org: row['요청자소속'] || '',
        requester_phone: row['요청자연락처'] || '',
        requester_email: row['요청자이메일'] || '',
        kepco_number: row['한전고객번호'] || '',
        building_code: row['건물코드'] || '',
        building_name: row['건물명'] || '',
        address_text: row['건물주소'] || '',
        notes: row['특이사항'] || '',
        capex_amount: parseInt(row['CAPEX'] || '0'),
        is_low_voltage: false, // 엑셀은 기본값 false
        priority: row['우선순위'] || '보통',
        operation_team: row['운용팀'] || '',
        info_center: row['정보센터'] || '',
        building_type: row['건물유형'] || '',
        building_dong: row['동수'] || '',
        household_count: row['세대수'] || '',
        gwangdanguksa_code: row['국사코드'] || '',
        gwangdanguksa_name: row['국사명'] || '',
        equipment_install_date: row['장비설치일'] || null,
        billing_type: row['청구유형'] || '',
        complainant_name: row['민원인이름'] || '',
        complainant_phone: row['민원인연락처'] || '',
        complainant_email: row['민원인이메일'] || '',
        breaker_location: row['차단기위치'] || '',
        meter_location: row['계량기위치'] || '',
      });
      successCount++;
    } catch (e) {
      console.error('Batch error:', e);
      failCount++;
    }
  }

  showLoading(false);
  showToast(`일괄 접수 완료: 성공 ${successCount}건, 실패 ${failCount}건`);
  if (successCount > 0) {
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
  }
}
