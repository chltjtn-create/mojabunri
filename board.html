<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 — SKB 모자분리 공사요청</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .board-list { display:flex; flex-direction:column; gap:.6rem; }
    .board-card { background:#fff; border:1px solid #e9ecef; border-radius:8px; padding:.75rem 1rem; cursor:pointer; transition:.1s; display:flex; justify-content:space-between; align-items:center; gap:.75rem; }
    .board-card:hover { background:#f8f9ff; border-color:#0052cc; }
    .board-card.resolved { opacity:.6; }
    .board-title { font-weight:600; font-size:.9rem; color:#212529; }
    .board-meta { font-size:.75rem; color:#6c757d; margin-top:.2rem; }
    .board-right { display:flex; align-items:center; gap:.5rem; white-space:nowrap; }
    .cat-badge { font-size:.72rem; padding:.2rem .55rem; border-radius:20px; font-weight:600; }
    .cat-개선사항 { background:#e7f3ff; color:#0052cc; }
    .cat-요청사항 { background:#fff3e0; color:#e65100; }
    .cat-기타 { background:#f1f3f5; color:#495057; }
    .resolved-badge { font-size:.72rem; padding:.2rem .55rem; border-radius:20px; background:#d4edda; color:#155724; font-weight:600; }

    /* 모달 */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; }
    .modal-box { background:#fff; border-radius:10px; padding:1.5rem; width:520px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .modal-title { font-size:1rem; font-weight:700; margin-bottom:1rem; }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">⚡ SKB 모자분리 공사요청</span>
  <nav id="app-nav">
    <a href="dashboard.html">대시보드</a>
    <a href="request-new.html">모자분리접수</a>
    <a href="board.html">게시판</a>
    <a href="admin.html" id="nav-admin" style="display:none">관리자</a>
  </nav>
  <script>(function(){var p=location.pathname.split('/').pop()||'dashboard.html';document.querySelectorAll('#app-nav a').forEach(function(a){if(a.getAttribute('href')===p)a.classList.add('nav-active');});})();</script>
  <div class="user-info">
    <span id="user-info"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="container" style="max-width:800px;">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-size:1rem;font-weight:700;">💬 게시판 — 개선사항 / 요청사항</h2>
      <button class="btn btn-primary btn-sm" onclick="openWrite()">✏️ 글쓰기</button>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:.75rem;">
      <select id="filter-cat" class="form-control" style="width:130px;font-size:.82rem;" onchange="renderList()">
        <option value="">전체</option>
        <option value="개선사항">개선사항</option>
        <option value="요청사항">요청사항</option>
        <option value="기타">기타</option>
      </select>
      <select id="filter-resolved" class="form-control" style="width:110px;font-size:.82rem;" onchange="renderList()">
        <option value="">전체</option>
        <option value="false">미완료</option>
        <option value="true">완료</option>
      </select>
    </div>

    <div id="board-list" class="board-list">
      <div style="text-align:center;padding:2rem;color:#6c757d;">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-overlay" id="modal-write">
  <div class="modal-box">
    <div class="modal-title">✏️ 새 글 작성</div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select id="write-cat" class="form-control">
        <option value="개선사항">개선사항</option>
        <option value="요청사항">요청사항</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input type="text" id="write-title" class="form-control" placeholder="제목을 입력하세요">
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea id="write-content" class="form-control" rows="5" placeholder="내용을 입력하세요"></textarea>
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="submitPost()">등록</button>
    </div>
  </div>
</div>

<!-- 상세 보기 모달 -->
<div class="modal-overlay" id="modal-view">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;">
      <div>
        <span id="view-cat-badge"></span>
        <span id="view-resolved-badge" style="display:none;" class="resolved-badge" style="margin-left:.3rem;">✅ 처리완료</span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕ 닫기</button>
    </div>
    <h3 id="view-title" style="font-size:1rem;font-weight:700;margin-bottom:.4rem;"></h3>
    <div id="view-meta" style="font-size:.78rem;color:#6c757d;margin-bottom:.75rem;"></div>
    <div id="view-content" style="font-size:.875rem;color:#212529;white-space:pre-wrap;line-height:1.6;border-top:1px solid #e9ecef;padding-top:.75rem;"></div>
    <div id="view-admin-actions" style="display:none;margin-top:1rem;padding-top:.75rem;border-top:1px solid #e9ecef;">
      <button class="btn btn-success btn-sm" id="btn-resolve" onclick="toggleResolved()">✅ 처리완료로 표시</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, renderUserInfo, logout as _logout } from './assets/js/auth.js';
import { supabase } from './assets/js/supabase-client.js';
import { showToast, showLoading } from './assets/js/ui.js';

window.logout = _logout;

let profile = null;
let posts = [];
let currentPost = null;

(async () => {
  profile = await requireAuth();
  if (!profile) return;
  renderUserInfo(profile);
  if (profile.role === 'admin' || profile.role === 'skb_manager') {
    document.getElementById('nav-admin').style.display = 'flex';
  }
  await loadPosts();
})();

async function loadPosts() {
  const { data, error } = await supabase
    .from('board_posts')
    .select('*, author:profiles(full_name, role)')
    .order('created_at', { ascending: false });

  if (error) { showToast('불러오기 실패: ' + error.message, 'error'); return; }
  posts = data || [];
  renderList();
}

window.renderList = () => {
  const cat = document.getElementById('filter-cat').value;
  const resolved = document.getElementById('filter-resolved').value;

  const filtered = posts.filter(p =>
    (!cat || p.category === cat) &&
    (resolved === '' || String(p.is_resolved) === resolved)
  );

  const el = document.getElementById('board-list');
  if (!filtered.length) {
    el.innerHTML = '<div style="text-align:center;padding:2rem;color:#6c757d;">게시글이 없습니다.</div>';
    return;
  }

  const catColors = { '개선사항': 'cat-개선사항', '요청사항': 'cat-요청사항', '기타': 'cat-기타' };
  el.innerHTML = filtered.map(p => `
    <div class="board-card ${p.is_resolved ? 'resolved' : ''}" onclick="viewPost('${p.id}')">
      <div>
        <div class="board-title">${escHtml(p.title)}</div>
        <div class="board-meta">${p.author?.full_name || '익명'} · ${new Date(p.created_at).toLocaleDateString('ko-KR')}</div>
      </div>
      <div class="board-right">
        <span class="cat-badge ${catColors[p.category] || 'cat-기타'}">${p.category}</span>
        ${p.is_resolved ? '<span class="resolved-badge">✅ 완료</span>' : ''}
      </div>
    </div>
  `).join('');
};

window.openWrite = () => {
  document.getElementById('write-title').value = '';
  document.getElementById('write-content').value = '';
  document.getElementById('modal-write').style.display = 'flex';
};

window.submitPost = async () => {
  const title = document.getElementById('write-title').value.trim();
  const content = document.getElementById('write-content').value.trim();
  const category = document.getElementById('write-cat').value;
  if (!title || !content) { showToast('제목과 내용을 입력하세요.', 'error'); return; }

  showLoading(true);
  const { error } = await supabase.from('board_posts').insert({
    title, content, category, author_id: profile.id
  });
  showLoading(false);

  if (error) { showToast('등록 실패: ' + error.message, 'error'); return; }
  showToast('등록 완료');
  closeModal();
  await loadPosts();
};

window.viewPost = (id) => {
  currentPost = posts.find(p => p.id === id);
  if (!currentPost) return;

  const catColors = { '개선사항': 'cat-개선사항', '요청사항': 'cat-요청사항', '기타': 'cat-기타' };
  document.getElementById('view-cat-badge').outerHTML =
    `<span id="view-cat-badge" class="cat-badge ${catColors[currentPost.category] || 'cat-기타'}">${currentPost.category}</span>`;
  document.getElementById('view-title').textContent = currentPost.title;
  document.getElementById('view-meta').textContent =
    `${currentPost.author?.full_name || '익명'} · ${new Date(currentPost.created_at).toLocaleString('ko-KR')}`;
  document.getElementById('view-content').textContent = currentPost.content;

  const resolvedBadge = document.getElementById('view-resolved-badge');
  resolvedBadge.style.display = currentPost.is_resolved ? 'inline' : 'none';

  const adminActions = document.getElementById('view-admin-actions');
  if (profile.role === 'admin') {
    adminActions.style.display = 'block';
    document.getElementById('btn-resolve').textContent =
      currentPost.is_resolved ? '↩️ 미완료로 되돌리기' : '✅ 처리완료로 표시';
  } else {
    adminActions.style.display = 'none';
  }

  document.getElementById('modal-view').style.display = 'flex';
};

window.toggleResolved = async () => {
  if (!currentPost) return;
  showLoading(true);
  const { error } = await supabase.from('board_posts')
    .update({ is_resolved: !currentPost.is_resolved })
    .eq('id', currentPost.id);
  showLoading(false);
  if (error) { showToast('실패: ' + error.message, 'error'); return; }
  showToast('변경 완료');
  closeModal();
  await loadPosts();
};

window.closeModal = () => {
  document.getElementById('modal-write').style.display = 'none';
  document.getElementById('modal-view').style.display = 'none';
};

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
